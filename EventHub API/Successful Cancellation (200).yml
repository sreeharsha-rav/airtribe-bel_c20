info:
  name: Successful Cancellation (200)
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/api/reservations/{{reservationId}}/cancel/"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "test('Cancelled (200)', function () {\r

        \    expect(res.getStatus()).to.equal(200);\r

        });\r

        const body = res.getBody();\r

        test('Status is cancelled', function () {\r

        \    expect(body.status).to.eql('cancelled');\r

        });"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Cancels the reservation created earlier. Expected: 200 with status='cancelled'. The event's available_seats is restored (1 → 3)."
